<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep navy background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#061124"/>
    </linearGradient>
    <!-- Water gradient -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#004ea8" stop-opacity="1"/>
    </linearGradient>
    <!-- Sail highlight gradient -->
    <linearGradient id="sail1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8deff"/>
    </linearGradient>
    <linearGradient id="sail2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f2ff"/>
      <stop offset="100%" stop-color="#a8c8ff"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sun" cx="75%" cy="22%" r="18%">
      <stop offset="0%" stop-color="#ffd60a" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ff9f0a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff9f0a" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip for rounded corners -->
    <clipPath id="rounded">
      <rect width="512" height="512" rx="115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <g clip-path="url(#rounded)">
    <!-- Sun glow in top right -->
    <circle cx="385" cy="112" r="92" fill="url(#sun)"/>
    <circle cx="385" cy="112" r="42" fill="#ffd60a" opacity="0.95"/>
    <circle cx="385" cy="112" r="32" fill="#ffe566"/>

    <!-- Subtle mountain silhouette (Alps in background) -->
    <path d="M0 310 L60 240 L110 275 L160 200 L220 255 L270 185 L320 245 L370 210 L420 260 L470 220 L512 250 L512 340 L0 340 Z" 
          fill="#0a1e40" opacity="0.6"/>

    <!-- Water surface -->
    <rect x="0" y="330" width="512" height="182" fill="url(#water)"/>

    <!-- Water shimmer lines -->
    <path d="M20 355 Q80 348 140 355 Q200 362 260 355" 
          fill="none" stroke="#64d2ff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <path d="M180 375 Q250 368 320 375 Q390 382 450 375" 
          fill="none" stroke="#64d2ff" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M60 398 Q130 392 200 398 Q270 405 340 398" 
          fill="none" stroke="#64d2ff" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

    <!-- Boat hull -->
    <path d="M156 336 Q256 350 356 336 L336 368 Q256 382 176 368 Z" 
          fill="#1a3a6b" stroke="#2a5aab" stroke-width="3"/>
    <!-- Hull shine -->
    <path d="M185 340 Q256 348 327 340" 
          fill="none" stroke="#4a8adb" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Mast -->
    <rect x="251" y="110" width="10" height="228" rx="5" fill="#e0ecff"/>

    <!-- Main sail (Großsegel) - billowing left -->
    <path d="M256 118 L256 298 L128 268 Q140 220 160 180 Q190 140 256 118 Z" 
          fill="url(#sail1)" opacity="0.97"/>
    <!-- Sail shadow/fold -->
    <path d="M256 118 Q220 150 200 200 Q180 248 200 280 L256 298 Q230 250 240 200 Q248 155 256 118 Z"
          fill="#c0d8ff" opacity="0.35"/>

    <!-- Foresail (Fock) - right of mast -->
    <path d="M256 140 L256 290 L344 252 Q320 210 296 174 Q278 150 256 140 Z" 
          fill="url(#sail2)" opacity="0.88"/>

    <!-- Sail top highlight -->
    <circle cx="256" cy="118" r="7" fill="#ffffff" opacity="0.9"/>

    <!-- Water reflection of sails (subtle) -->
    <path d="M200 340 Q256 358 310 340 Q300 360 270 370 Q256 375 242 370 Q215 360 200 340 Z"
          fill="#64d2ff" opacity="0.12"/>
  </g>

  <!-- Subtle inner border/frame -->
  <rect x="2" y="2" width="508" height="508" rx="114" fill="none" 
        stroke="rgba(255,255,255,0.08)" stroke-width="3"/>
</svg>
